server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown routes → index.html so react-router can handle them.
    location / {
        try_files $uri /index.html;
    }

    # When this container is reached directly (not via Caddy), forward /api to
    # the backend service on the same Docker network. The deploy repo's
    # reverse proxy typically handles this at the edge instead.
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public link-preview pages (what Discord / chat apps scrape). Lives on
    # the backend so it can render OG tags with the right per-track data.
    location /share/ {
        proxy_pass http://backend:8080/share/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public embeddable players advertised in link-preview metadata.
    location /embed/ {
        proxy_pass http://backend:8080/embed/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
